  <text x="765" y="497" text-anchor="middle" font-size="12" font-weight="600" fill="#4a148c">worker-gpu</text>
  <text x="765" y="512" text-anchor="middle" font-size="10" fill="#7b1fa2">RTX 5060 Ti</text>

  <!-- Control plane arrows -->
  <line x1="240" y1="499" x2="265" y2="499" stroke="#1565c0" stroke-width="1"/>
  <polygon points="265,499 258,494 258,504" fill="#1565c0"/>
  <line x1="400" y1="499" x2="430" y2="499" stroke="#1565c0" stroke-width="1"/>
  <polygon points="430,499 423,494 423,504" fill="#1565c0"/>

  <!-- Arrows -->
  <line x1="245" y1="336" x2="170" y2="480" stroke="#2e7d32" stroke-width="1.5"/>
  <polygon points="170,480 178,470 162,470" fill="#2e7d32"/>


  <!-- ============================================ -->
  <!-- LAYER: K8s Infrastructure (row 5, y=570)     -->
  <!-- ============================================ -->

  <rect x="30" y="552" width="900" height="22" rx="4" fill="#eceff1"/>
  <text x="480" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#455a64">Kubernetes Infrastructure (kubernetes/infra/)</text>

