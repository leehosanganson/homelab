<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="960" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">Homelab Network Architecture</text>

  <!-- ============================================ -->
  <!-- LAYER: External / Internet (row 1, y=55)     -->
  <!-- ============================================ -->

  <!-- Cloudflare Tunnel (centered) -->
  <rect x="360" y="75" width="240" height="48" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="480" y="95" text-anchor="middle" font-size="13" font-weight="500" fill="#bf360c">Cloudflare Tunnel</text>
  <text x="480" y="112" text-anchor="middle" font-size="11" fill="#795548">Zero Trust Gateway</text>

  <!-- Users (left) -->
  <rect x="60" y="75" width="130" height="48" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="125" y="95" text-anchor="middle" font-size="13" font-weight="500" fill="#bf360c">Users</text>
  <text x="125" y="112" text-anchor="middle" font-size="11" fill="#795548">HTTPS</text>

  <!-- Cloudflare DNS (right) -->
  <rect x="770" y="75" width="130" height="48" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="835" y="95" text-anchor="middle" font-size="13" font-weight="500" fill="#bf360c">Cloudflare DNS</text>
  <text x="835" y="112" text-anchor="middle" font-size="11" fill="#795548">*.infra.*.dev</text>

  <!-- Arrows: Users → Tunnel, DNS → Tunnel -->
  <line x1="190" y1="99" x2="360" y2="99" stroke="#e65100" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="360,99 350,94 350,104" fill="#e65100"/>
  <line x1="770" y1="99" x2="600" y2="99" stroke="#e65100" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="600,99 610,94 610,104" fill="#e65100"/>


  <!-- ============================================ -->
  <!-- LAYER: Proxmox Cluster (row 2, y=160)        -->
  <!-- ============================================ -->

  <!-- Proxmox Cluster label bar -->
  <rect x="30" y="148" width="900" height="24" rx="4" fill="#eceff1"/>
  <text x="480" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#455a64">Proxmox VE Cluster</text>

  <!-- pve01, pve02, pve03 nodes -->
  <rect x="160" y="180" width="170" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="245" y="197" text-anchor="middle" font-size="12" font-weight="500" fill="#0d47a1">pve01</text>
  <text x="245" y="213" text-anchor="middle" font-size="10" fill="#1565c0">Mini PC</text>

  <rect x="395" y="180" width="170" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="480" y="197" text-anchor="middle" font-size="12" font-weight="500" fill="#0d47a1">pve02</text>
  <text x="480" y="213" text-anchor="middle" font-size="10" fill="#1565c0">Mini PC</text>

  <rect x="630" y="180" width="170" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="715" y="197" text-anchor="middle" font-size="12" font-weight="500" fill="#0d47a1">pve03</text>
  <text x="715" y="213" text-anchor="middle" font-size="10" fill="#1565c0">Gaming PC</text>

  <!-- LAN bar -->
  <rect x="240" y="238" width="480" height="20" rx="4" fill="#eceff1" stroke="#455a64" stroke-width="0.5"/>
  <text x="480" y="252" text-anchor="middle" font-size="10" font-weight="500" fill="#455a64">LAN 192.168.1.0/24 (vmbr0)</text>

  <!-- Arrows: LAN → nodes -->
  <line x1="340" y1="258" x2="245" y2="220" stroke="#455a64" stroke-width="0.75" stroke-dasharray="3,3"/>
  <line x1="480" y1="258" x2="480" y2="220" stroke="#455a64" stroke-width="0.75" stroke-dasharray="3,3"/>
  <line x1="620" y1="258" x2="715" y2="220" stroke="#455a64" stroke-width="0.75" stroke-dasharray="3,3"/>


