  <!-- LAYER: Infrastructure VMs (row 3, y=310)     -->
  <!-- ============================================ -->

  <!-- HAProxy trio -->
  <text x="245" y="285" text-anchor="middle" font-size="11" font-weight="600" fill="#666">HAProxy Trio</text>
  <rect x="160" y="298" width="170" height="38" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="245" y="315" text-anchor="middle" font-size="12" font-weight="500" fill="#1b5e20">haproxy-1</text>
  <text x="245" y="330" text-anchor="middle" font-size="10" fill="#2e7d32">.251 · pve01</text>

  <rect x="395" y="298" width="170" height="38" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="480" y="315" text-anchor="middle" font-size="12" font-weight="500" fill="#1b5e20">haproxy-2</text>
  <text x="480" y="330" text-anchor="middle" font-size="10" fill="#2e7d32">.252 · pve02</text>

  <rect x="630" y="298" width="170" height="38" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="715" y="315" text-anchor="middle" font-size="12" font-weight="500" fill="#1b5e20">haproxy-3</text>
  <text x="715" y="330" text-anchor="middle" font-size="10" fill="#2e7d32">.253 · pve03</text>

  <!-- OpenCode -->
  <text x="245" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#666">Other VMs</text>
  <rect x="160" y="393" width="170" height="38" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="245" y="410" text-anchor="middle" font-size="12" font-weight="500" fill="#1b5e20">opencode-1</text>
  <text x="245" y="425" text-anchor="middle" font-size="10" fill="#2e7d32">.161 · pve01</text>

  <!-- Arrows -->
  <line x1="480" y1="123" x2="245" y2="298" stroke="#2e7d32" stroke-width="1.5"/>
  <polygon points="245,298 238,308 252,308" fill="#2e7d32"/>

  <line x1="810" y1="99" x2="480" y2="298" stroke="#e65100" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>


