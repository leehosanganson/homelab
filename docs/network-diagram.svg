  <rect x="100" y="480" width="140" height="38" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="170" y="497" text-anchor="middle" font-size="12" font-weight="500" fill="#0d47a1">ctrl-01</text>
  <text x="170" y="512" text-anchor="middle" font-size="10" fill="#1565c0">.151</text>

  <rect x="265" y="480" width="140" height="38" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="335" y="497" text-anchor="middle" font-size="12" font-weight="500" fill="#0d47a1">ctrl-02</text>
  <text x="335" y="512" text-anchor="middle" font-size="10" fill="#1565c0">.152</text>

  <rect x="430" y="480" width="140" height="38" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="500" y="497" text-anchor="middle" font-size="12" font-weight="500" fill="#0d47a1">ctrl-03</text>
  <text x="500" y="512" text-anchor="middle" font-size="10" fill="#1565c0">.153</text>

  <!-- GPU Worker (right, highlighted) -->
