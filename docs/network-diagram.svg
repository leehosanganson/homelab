  <rect x="175" y="585" width="95" height="30" rx="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.75"/>
  <text x="222" y="604" text-anchor="middle" font-size="10" fill="#1b5e20">Cert Manager</text>

  <rect x="280" y="585" width="95" height="30" rx="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.75"/>
  <text x="327" y="604" text-anchor="middle" font-size="10" fill="#1b5e20">GPU Operator</text>

  <rect x="385" y="585" width="95" height="30" rx="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.75"/>
  <text x="432" y="604" text-anchor="middle" font-size="10" fill="#1b5e20">External Secrets</text>

  <rect x="490" y="585" width="95" height="30" rx="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.75"/>
  <text x="537" y="604" text-anchor="middle" font-size="10" fill="#1b5e20">CloudNativePG</text>

  <rect x="595" y="585" width="95" height="30" rx="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.75"/>
  <text x="642" y="604" text-anchor="middle" font-size="10" fill="#1b5e20">Synology CSI</text>

  <rect x="700" y="585" width="95" height="30" rx="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.75"/>
  <text x="747" y="604" text-anchor="middle" font-size="10" fill="#1b5e20">Harbor</text>

  <rect x="805" y="585" width="95" height="30" rx="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.75"/>
  <text x="852" y="604" text-anchor="middle" font-size="10" fill="#1b5e20">Velero + Metrics</text>


  <!-- ============================================ -->
  <!-- LAYER: External Services (row 6, y=650)      -->
  <!-- ============================================ -->

  <text x="340" y="645" text-anchor="middle" font-size="11" font-weight="600" fill="#666">External Services</text>

  <rect x="240" y="658" width="170" height="35" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="325" y="675" text-anchor="middle" font-size="11" font-weight="500" fill="#bf360c">Synology NAS</text>
  <text x="325" y="689" text-anchor="middle" font-size="9" fill="#795548">.197 · CSI PV Provisioner</text>

  <rect x="450" y="658" width="100" height="35" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="500" y="675" text-anchor="middle" font-size="11" font-weight="500" fill="#bf360c">Pi-hole 1</text>
  <text x="500" y="689" text-anchor="middle" font-size="9" fill="#795548">.132</text>

  <rect x="560" y="658" width="100" height="35" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="610" y="675" text-anchor="middle" font-size="11" font-weight="500" fill="#bf360c">Pi-hole 2</text>
  <text x="610" y="689" text-anchor="middle" font-size="9" fill="#795548">.133</text>

</svg>
