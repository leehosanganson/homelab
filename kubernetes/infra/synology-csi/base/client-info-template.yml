---
clients:
  - host: 192.168.1.1
    port: 5001
    https: true
    username: "${DSM_USERNAME}"
    password: "${DSM_PASSWORD}"
  - host: 192.168.1.2
    port: 5001
    https: true
    username: "${DSM_USERNAME}"
    password: "${DSM_PASSWORD}"

#host:                      # ipv4 address or domain of the DSM
#port:                      # port for connecting to the DSM (default HTTPS is 5001)
#https:                     # set this true to use https. you need to specify the port to DSM HTTPS port as well
#username:                  # username
#password:                  # password