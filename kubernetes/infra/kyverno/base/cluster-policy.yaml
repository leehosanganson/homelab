apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: replace-image-registry
  annotations:
    policies.kyverno.io/title: Replace Image Registry with Harbor Proxy
    policies.kyverno.io/category: Harbor
    policies.kyverno.io/description: >-
      Rewrites non-system container image references to pull through the
      internal Harbor proxy cache at harbor.leehosanganson.dev.
      Kubernetes (registry.k8s.io) and Kyverno (kyverno namespace) images
      are explicitly excluded and pulled directly from upstream.
      Mappings:
        ghcr.io       → harbor.leehosanganson.dev/ghcr
        gcr.io        → harbor.leehosanganson.dev/gcr
        docker.io     → harbor.leehosanganson.dev/dockerhub
        <unqualified> → harbor.leehosanganson.dev/dockerhub
spec:
  background: false
  rules:
    - name: replace-ghcr-io
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kyverno
      mutate:
        foreach:
          - list: "request.object.spec.initContainers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^ghcr\\.io/.*"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('ghcr.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/ghcr/') }}"
          - list: "request.object.spec.containers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^ghcr\\.io/.*"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('ghcr.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/ghcr/') }}"
          - list: "request.object.spec.ephemeralContainers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^ghcr\\.io/.*"
            patchStrategicMerge:
              spec:
                ephemeralContainers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('ghcr.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/ghcr/') }}"

    - name: replace-gcr-io
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kyverno
      mutate:
        foreach:
          - list: "request.object.spec.initContainers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^gcr\\.io/.*"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('gcr.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/gcr/') }}"
          - list: "request.object.spec.containers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^gcr\\.io/.*"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('gcr.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/gcr/') }}"
          - list: "request.object.spec.ephemeralContainers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^gcr\\.io/.*"
            patchStrategicMerge:
              spec:
                ephemeralContainers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('gcr.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/gcr/') }}"

    - name: replace-docker-io
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kyverno
      mutate:
        foreach:
          - list: "request.object.spec.initContainers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^docker\\.io/.*"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('docker.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/dockerhub/') }}"
          - list: "request.object.spec.containers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^docker\\.io/.*"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('docker.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/dockerhub/') }}"
          - list: "request.object.spec.ephemeralContainers[]"
            preconditions:
              any:
                - key: "{{ element.image }}"
                  operator: Regex
                  value: "^docker\\.io/.*"
            patchStrategicMerge:
              spec:
                ephemeralContainers:
                  - (name): "{{ element.name }}"
                    image: "{{ regex_replace_all_literal('docker.io/', '{{ element.image }}', 'harbor.leehosanganson.dev/dockerhub/') }}"

    - name: replace-unqualified-dockerhub
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kyverno
      mutate:
        foreach:
          - list: "request.object.spec.initContainers[]"
            preconditions:
              all:
                - key: "{{ regex_match('^(ghcr\\.io|gcr\\.io|registry\\.k8s\\.io|docker\\.io|harbor\\.leehosanganson\\.dev)/', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{ element.name }}"
                    image: "harbor.leehosanganson.dev/dockerhub/{{ element.image }}"
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{ regex_match('^(ghcr\\.io|gcr\\.io|registry\\.k8s\\.io|docker\\.io|harbor\\.leehosanganson\\.dev)/', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    image: "harbor.leehosanganson.dev/dockerhub/{{ element.image }}"
          - list: "request.object.spec.ephemeralContainers[]"
            preconditions:
              all:
                - key: "{{ regex_match('^(ghcr\\.io|gcr\\.io|registry\\.k8s\\.io|docker\\.io|harbor\\.leehosanganson\\.dev)/', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                ephemeralContainers:
                  - (name): "{{ element.name }}"
                    image: "harbor.leehosanganson.dev/dockerhub/{{ element.image }}"
