apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher
spec:
  interval: 1h
  chart:
    spec:
      chart: rancher
      version: 2.13.3
      sourceRef:
        kind: HelmRepository
        name: rancher-stable
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: rancher-values
