apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin-external
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: harbor-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: harbor-admin-password
