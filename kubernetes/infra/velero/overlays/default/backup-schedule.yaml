apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: default
  labels:
    velero.io/schedule-name: default
spec:
  schedule: 0 7 * * *
  template:
    defaultVolumesToFsBackup: false
    includedNamespaces:
      - actual-budget
      - grimmory
      - home-assistant
      - immich
      - karakeep
      - llm
      - media
      - minecraft
      - n8n
      - navidrome
      - paperless
      - syncthing
      - zotero
    includedResources:
      - deployments
      - pods
      - persistentvolumes
      - persistentvolumeclaims
      - namespaces
    storageLocation: default
    ttl: 240h0m0s
