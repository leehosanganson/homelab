apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
data:
  config.json: |
    {
      "platform": "github",
      "repositories": [
        "leehosanganson/homelab"
      ],
      "gitAuthor": "Renovate Bot <bot@renovateapp.com>",
      "onboarding": false,
      "requireConfig": "optional",
      "pinDigests": true,
      "prHourlyLimit": 0,
      "prConcurrentLimit": 0,
      "ignorePaths": [
        "fluxcd/clusters/production/flux-system/gotk-components.yaml",
        "kubernetes/infra/cloudnativepg/**",
        "kubernetes/infra/synology-csi/**"
      ],
      "flux": {
        "managerFilePatterns": [
          "/^fluxcd\\/clusters\\/production\\/.+\\.ya?ml$/",
          "/^kubernetes\\/.+\\/release\\.yaml$/",
          "/^kubernetes\\/infra\\/helm\\/.+\\.ya?ml$/"
        ]
      },
      "kubernetes": {
        "managerFilePatterns": [
          "/^kubernetes\\/.+\\.ya?ml$/"
        ]
      }
    }
