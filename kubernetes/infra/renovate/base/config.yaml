apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
data:
  config.js: |
    module.exports = {
      platform: 'github',
      repositories: ['leehosanganson/homelab'],
      gitAuthor: 'Renovate Bot <bot@renovateapp.com>',
      onboarding: false,
      requireConfig: 'optional',
      pinDigests: true,
      prHourlyLimit: 0,
      prConcurrentLimit: 0,
      ignorePaths: [
        'fluxcd/clusters/production/flux-system/gotk-components.yaml',
        'kubernetes/infra/cloudnativepg/cnpg-1.27.0.yaml',
        'kubernetes/infra/cloudnativepg/barman-cloud-plugin.yaml',
      ],
      flux: {
        managerFilePatterns: [
          '/^fluxcd\\/clusters\\/production\\/.+\\.ya?ml$/',
          '/^kubernetes\\/.+\\/release\\.yaml$/',
          '/^kubernetes\\/infra\\/helm\\/.+\\.ya?ml$/',
        ],
      },
      kubernetes: {
        managerFilePatterns: [
          '/^kubernetes\\/.+\\/(?:[a-z]+-)?(?:deployment|statefulset|daemonset|cronjob)\\.ya?ml$/',
          '/^kubernetes\\/infra\\/synology-csi\\/base\\/(?:controller|node)\\.yml$/',
          '/^kubernetes\\/infra\\/synology-csi\\/base\\/snapshotter\\/snapshotter\\.yaml$/',
        ],
      },
    };
