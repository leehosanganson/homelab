apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
spec:
  schedule: "0 */12 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43.170.18@sha256:976d49d41e750ad97e634e50b3c6cfafebce0176778bf80af9e092d228e744a8
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-env
                      key: token
                - name: RENOVATE_CONFIG_FILE
                  value: /usr/src/app/config.json
                - name: LOG_LEVEL
                  value: "debug"
                - name: RENOVATE_GIT_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: renovate-git-private-key
                      key: GIT_PRIVATE_KEY
              volumeMounts:
                - name: renovate-config
                  mountPath: /usr/src/app/config.json
                  subPath: config.json
          restartPolicy: Never
          volumes:
            - name: renovate-config
              configMap:
                name: renovate-config
