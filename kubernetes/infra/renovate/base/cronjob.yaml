apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43@sha256:6488fcff4416a3872e2bbb305bfff73e9aa65556e89c39778c2920a2a52832ed
              env:
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-env
                      key: token
                - name: RENOVATE_CONFIG_FILE
                  value: /usr/src/app/config.js
                - name: LOG_LEVEL
                  value: debug
              volumeMounts:
                - name: renovate-config
                  mountPath: /usr/src/app/config.js
                  subPath: config.js
          restartPolicy: Never
          volumes:
            - name: renovate-config
              configMap:
                name: renovate-config
