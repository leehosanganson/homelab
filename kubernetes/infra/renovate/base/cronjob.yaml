apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43@sha256:9a717d0ee471653a3898a6c25a47057c6f06120923be9b3059616525e59fb391
              env:
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-env
                      key: token
                - name: RENOVATE_CONFIG_FILE
                  value: /usr/src/app/config.json
                - name: LOG_LEVEL
                  value: "debug"
              volumeMounts:
                - name: renovate-config
                  mountPath: /usr/src/app/config.json
                  subPath: config.json
          restartPolicy: Never
          volumes:
            - name: renovate-config
              configMap:
                name: renovate-config
