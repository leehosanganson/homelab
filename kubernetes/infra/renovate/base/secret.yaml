apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-env-external
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: renovate-env
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: renovate-token
