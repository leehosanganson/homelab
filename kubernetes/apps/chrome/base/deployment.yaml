apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrome
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chrome
  template:
    metadata:
      labels:
        app: chrome
    spec:
      runtimeClassName: nvidia
      securityContext:
        fsGroup: 1000
      containers:
        - name: chrome
          image: linuxserver/chrome:147.0.7727@sha256:c8f38d381285ca4f0bbd9c9c9becbbe4f9aeab870a4bc7021567dd32a011a706
          envFrom:
            - configMapRef:
                name: chrome-env
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 3001
              name: https
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          volumeMounts:
            - name: chrome-profile
              mountPath: /config
            - name: dri
              mountPath: /dev/dri
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: chrome-profile
          persistentVolumeClaim:
            claimName: chrome-pvc
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: shm
          emptyDir:
            medium: Memory
