apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng-valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng-valkey
  template:
    metadata:
      labels:
        app: searxng-valkey
    spec:
      securityContext:
        fsGroup: 999
      volumes:
        - name: valkey-data
          emptyDir:
            sizeLimit: "512Mi"
      containers:
        - name: valkey
          image: valkey/valkey:9.1.1@sha256:3acc0687f2a2e1091fae6450d7842dd658c941338cf0a873ddd9e14b9e4ea4dd
          ports:
            - containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: valkey-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
