apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: life-in-the-uk-quiz
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: www.leehosanganson.dev
      http:
        paths:
          - path: /life-in-the-uk-quiz
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /life-in-the-uk-quiz/api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
  tls:
    - hosts:
        - www.leehosanganson.dev
      secretName: life-in-the-uk-quiz-tls
