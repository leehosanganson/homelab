apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: life-in-the-uk-quiz-frontend
  template:
    metadata:
      labels:
        app: life-in-the-uk-quiz-frontend
    spec:
      containers:
        - name: frontend
          image: harbor.leehosanganson.dev/leehosanganson/life-in-the-uk-quiz-frontend:staging
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: frontend-config
      restartPolicy: Always
