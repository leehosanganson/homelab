apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grimmory-env-external
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: grimmory-env
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: grimmory-db-username
    - secretKey: password
      remoteRef:
        key: grimmory-db-password
    - secretKey: root-password
      remoteRef:
        key: grimmory-db-root-password
