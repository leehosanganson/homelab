apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grimmory
  template:
    metadata:
      labels:
        app: grimmory
    spec:
      # securityContext:
      #   runAsUser: 1000
      #   runAsGroup: 1000
      #   fsGroup: 1000
      containers:
        - name: grimmory
          image: ghcr.io/grimmory-tools/grimmory:v3.2.2@sha256:c3fc5ed1d30e33fb6c276dfbb438d29eb7b8f082a6b0c8a66d285564ee758246
          ports:
            - containerPort: 6060
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: grimmory-env
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-env
                  key: password
          envFrom:
            - configMapRef:
                name: grimmory-configmap
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: books
              mountPath: /books
            - name: bookdrop
              mountPath: /bookdrop
          resources:
            limits:
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 6060
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
      restartPolicy: Always
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grimmory-data-pvc
        - name: books
          persistentVolumeClaim:
            claimName: grimmory-books-pvc
        - name: bookdrop
          persistentVolumeClaim:
            claimName: grimmory-bookdrop-pvc
