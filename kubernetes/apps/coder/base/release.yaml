apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
spec:
  interval: 1h
  chart:
    spec:
      chart: coder
      version: 2.32.0
      sourceRef:
        kind: HelmRepository
        name: coder-v2
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: coder-values
