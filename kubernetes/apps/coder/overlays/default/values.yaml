coder:
  env:
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-db-url
          key: url
    - name: CODER_ACCESS_URL
      value: "https://coder.homelab.leehosanganson.dev"
  service:
    type: ClusterIP
  ingress:
    enable: true
    className: traefik
    host: coder.homelab.leehosanganson.dev
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    wildcardHost: ""
    tls:
      enable: true
      secretName: coder-tls
    wildCardTLS:
      enable: false
      secretName: ""
