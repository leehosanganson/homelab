apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-iscsi
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: test-iscsi
spec:
  nodeName: homelab-server-9g2t
  containers:
    - name: nginx
      image: nginx@sha256:7f0adca1fc6c29c8dc49a2e90037a10ba20dc266baaed0988e9fb4d0d8b85ba0
      volumeMounts:
        - name: test-mount
          mountPath: /test
  volumes:
    - name: test-mount
      persistentVolumeClaim:
        claimName: test-iscsi
