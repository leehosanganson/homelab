apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termix
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: termix
    spec:
      containers:
        - name: termix
          image: ghcr.io/lukegus/termix:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - mountPath: /app/data
              name: termix-pvc
        - name: guacd
          image: guacamole/guacd:latest
          ports:
            - containerPort: 4822
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: termix-pvc
          persistentVolumeClaim:
            claimName: termix-pvc
