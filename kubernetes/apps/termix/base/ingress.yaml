apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: termix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: termix.homelab.leehosanganson.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: termix
                port:
                  number: 8080
  tls:
    - hosts:
        - termix.homelab.leehosanganson.dev
      secretName: termix-tls
