apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 127.0.0.1
        options:
          - name: ndots
            value: "1"
      containers:
        - name: qbittorrent
          image: linuxserver/qbittorrent:5.2.3@sha256:d8488fb24969bb0954cf64a1ca1cf7a763031641ba4246734964faea6f0b807a
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 8080
              name: qbit-web-ui
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "2Gi"
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
            - name: DNS_KEEP_NAMESERVER
              value: "off"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
        - name: gluetun
          image: qmcgaw/gluetun:v3.41@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          envFrom:
            - configMapRef:
                name: gluetun-config
          env:
            - name: DNS_KEEP_NAMESERVER
              value: "off"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-secrets
                  key: WIREGUARD_PRIVATE_KEY
        - name: slskd
          image: slskd/slskd:0.26.0@sha256:ecd4026d4f8fb504e2cc55323efa2c1f5b56d20d3686b018249cc36b48ea17a6
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 5030
              name: http
            - containerPort: 5031
              name: https
            - containerPort: 50300
              name: p2p
          env:
            - name: SLSKD_REMOTE_CONFIGURATION
              value: "true"
            - name: SLSKD_SLSK_USERNAME
              valueFrom:
                secretKeyRef:
                  name: media-credentials
                  key: download-client-username
            - name: SLSKD_SLSK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-credentials
                  key: media-password
            - name: SLSKD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-credentials
                  key: download-client-api-key
          volumeMounts:
            - name: downloads
              mountPath: /app/downloads
              subPath: music
      volumes:
        - name: downloads
          persistentVolumeClaim:
            claimName: qbit-download
        - name: config
          persistentVolumeClaim:
            claimName: qbit-pvc
