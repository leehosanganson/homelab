apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 127.0.0.1
        options:
          - name: ndots
            value: "1"
      containers:
        - name: qbittorrent
          image: linuxserver/qbittorrent:latest@sha256:1fc78c81850d658f17701bfa9d8de58ccc12ff27d36a9a176c6299e55aaf4b4e
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 8080
              name: qbit-web-ui
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "2Gi"
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
            - name: DNS_KEEP_NAMESERVER
              value: "off"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
        - name: gluetun
          image: qmcgaw/gluetun:latest@sha256:4f1ecfedd717bca7b2d94b405380a717bcf40ba723d82a69428d816744664542
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          envFrom:
            - configMapRef:
                name: gluetun-config
          env:
            - name: DNS_KEEP_NAMESERVER
              value: "off"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-secrets
                  key: WIREGUARD_PRIVATE_KEY
        - name: slskd
          image: slskd/slskd:latest@sha256:17ef977563be206f3b5932080b1e23883b2cb39dc9010640f6f39b4eaec887e3
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 5030
              name: http
            - containerPort: 5031
              name: https
            - containerPort: 50300
              name: p2p
          env:
            - name: SLSKD_REMOTE_CONFIGURATION
              value: "true"
            - name: SLSKD_SLSK_USERNAME
              valueFrom:
                secretKeyRef:
                  name: media-credentials
                  key: download-client-username
            - name: SLSKD_SLSK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-credentials
                  key: media-password
            - name: SLSKD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: media-credentials
                  key: download-client-api-key
          volumeMounts:
            - name: downloads
              mountPath: /app/downloads
              subPath: music
      volumes:
        - name: downloads
          persistentVolumeClaim:
            claimName: qbit-download
        - name: config
          persistentVolumeClaim:
            claimName: qbit-pvc
