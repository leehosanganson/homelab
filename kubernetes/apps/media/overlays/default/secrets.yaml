apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: media-credentials-external
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: media-credentials
    creationPolicy: Owner
  data:
    - secretKey: download-client-username
      remoteRef:
        key: download-client-username
    - secretKey: download-client-api-key
      remoteRef:
        key: download-client-api-key
    - secretKey: media-username
      remoteRef:
        key: media-username
    - secretKey: media-password
      remoteRef:
        key: media-password
