apiVersion: apps/v1
kind: Deployment
metadata:
  name: novnc-chrome
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: novnc-chrome
  template:
    metadata:
      labels:
        app: novnc-chrome
    spec:
      runtimeClassName: nvidia
      securityContext:
        fsGroup: 1000
      containers:
        - name: novnc-chrome
          image: ghcr.io/gitxpresso/chromekasmvnc:latest@sha256:1075f96a5bd7631e300c10f6282d0e05164c8732f61378f09f78179e8a8b1b7f
          securityContext:
            seccompProfile:
              type: Unconfined
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          volumeMounts:
            - name: chrome-profile
              mountPath: /config/.config/google-chrome
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: chrome-profile
          persistentVolumeClaim:
            claimName: novnc-chrome-pvc
        - name: dshm
          emptyDir:
            medium: Memory
