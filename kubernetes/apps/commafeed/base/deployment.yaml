apiVersion: apps/v1
kind: Deployment
metadata:
  name: commafeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commafeed
  template:
    metadata:
      labels:
        app: commafeed
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: commafeed
          image: athou/commafeed:7.1.0-postgresql@sha256:bf2e673a0a969ee26541c896e98c9cd2cc68fc0497a41cc202c6568d0046c4c0
          ports:
            - containerPort: 8082
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: commafeed-env
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: commafeed-env
                  key: password
          envFrom:
            - configMapRef:
                name: commafeed-configmap
          resources:
            limits:
              memory: "512Mi"
      restartPolicy: Always
