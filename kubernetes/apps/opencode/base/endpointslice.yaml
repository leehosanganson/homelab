# Explicit endpoint slice for the opencode ClusterIP service. Replaces the
# deprecated v1 Endpoints resource (deprecated in K8s 1.33+). Traefik's
# kubernetesingress provider can't use ExternalName services, so we provide
# explicit backend IPs pointing to the opencode-1 NixOS VM (192.168.1.161).
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  annotations:
    kubernetes.io/service-name: opencode
  labels:
    app: opencode
endpoints:
  - addresses:
      - "192.168.1.161"
    ports:
      - port: 4096
        protocol: TCP
