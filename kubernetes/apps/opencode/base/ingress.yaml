apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opencode
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: traefik
  rules:
    - host: opencode.homelab.leehosanganson.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opencode
                port:
                  number: 4096
  tls:
    - hosts:
        - opencode.homelab.leehosanganson.dev
      secretName: opencode-tls
