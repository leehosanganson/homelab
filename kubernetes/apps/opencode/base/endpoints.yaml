# Explicit endpoints for the opencode ClusterIP service. Traefik's kubernetesingress
# provider can't use ExternalName services, so we give it explicit backend IPs
# pointing to the opencode-1 NixOS VM (192.168.1.161).
apiVersion: v1
kind: Endpoints
metadata:
  name: opencode
subsets:
  - addresses:
      - ip: 192.168.1.161
    ports:
      - port: 4096
