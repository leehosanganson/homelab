apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opencode
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: opencode
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: volume-permissions
          image: busybox:1.37@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
          command: ["sh", "-c", "chown 1000:1000 /home/opencode"]
          volumeMounts:
            - name: opencode-workspace
              mountPath: /home/opencode
      containers:
        - name: opencode
          # TODO: Pin to specific tag with SHA-256 digest (e.g., ghcr.io/nimbleflux/opencode-docker:<tag>@sha256:<digest>)
          # Current image uses :latest tag - update before production deployment
          image: ghcr.io/nimbleflux/opencode-docker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4096
          envFrom:
            - configMapRef:
                name: opencode-config
            - secretRef:
                name: opencode-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /home/opencode
              name: opencode-workspace
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: opencode-workspace
          persistentVolumeClaim:
            claimName: opencode-pvc
        - name: tmp-volume
          emptyDir: {}
