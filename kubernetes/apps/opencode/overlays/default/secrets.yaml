apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opencode-secrets-external
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: opencode-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENCODE_SERVER_PASSWORD
      remoteRef:
        key: opencode-server-password
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: opencode-github-token
