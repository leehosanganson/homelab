apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 1h
  chart:
    spec:
      chart: forgejo
      version: 17.0.0
      sourceRef:
        kind: HelmRepository
        name: forgejo-helm
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: forgejo-values
