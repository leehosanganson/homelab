apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: 0.11.1
      sourceRef:
        kind: HelmRepository
        name: immich-app
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: immich-values
