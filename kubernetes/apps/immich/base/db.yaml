apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db
  labels:
    db: immich-db
spec:
  instances: 2
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.4.3
  storage:
    storageClass: synology-retain
    size: 10Gi
  monitoring:
    enablePodMonitor: true
  postgresql:
    shared_preload_libraries:
      - "vchord.so"
  bootstrap:
    recovery:
      source: clusterBackup
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-backup-storage
  externalClusters:
    - name: clusterBackup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: commafeed-backup-storage
          serverName: immich-db-backup
