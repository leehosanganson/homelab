apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp
spec:
  selector:
    matchLabels:
      name: llama-cpp
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        name: llama-cpp
    spec:
      runtimeClassName: nvidia
      initContainers:
        - name: download-model
          image: python:3.11-slim@sha256:233de06753d30d120b1a3ce359d8d3be8bda78524cd8f520c99883bfe33964cf
          command:
            - sh
            - -c
            - |
              apt-get update -qq && \
              apt-get install -y --no-install-recommends curl git && \
              pip install -U huggingface_hub[hf_transfer] hf_transfer && \
              export HF_HUB_ENABLE_HF_TRANSFER=1 && \
              mkdir -p /models && \
              hf download unsloth/gemma-4-26B-A4B-it-GGUF \
                gemma-4-26B-A4B-it-UD-IQ2_M.gguf \
                --local-dir /models
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: token
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 1
              memory: 4Gi
      containers:
        - name: llama-cpp
          image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:81c0f4a338c4851e0c5ab89ed47d8a4191af1b5ece560c0038c641435e897dc7
          args:
            - -m
            - /models/gemma-4-26B-A4B-it-UD-IQ2_M.gguf
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - -c
            - "32768"
            - -np
            - "1"
            - -ngl
            - "99"
            - --temp
            - "1.0"
            - --top-p
            - "0.95"
            - --top-k
            - "64"
            - --alias
            - "unsloth/gemma-4"
            - --chat-template-kwargs
            - '{"enable_thinking":false}'

          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            limits:
              cpu: "4"
              memory: 16G
              nvidia.com/gpu: "1"
            requests:
              cpu: "2"
              memory: 4G
              nvidia.com/gpu: "1"
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: llm-model-cache-pvc
