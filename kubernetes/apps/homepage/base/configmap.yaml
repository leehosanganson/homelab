  custom.css: |
    /* =====================================================================
     * Homepage Dashboard — Custom CSS
     * Neon-cyan / deep-space aesthetic for a self-hosted homelab
     * ===================================================================== */

    /* -------------------------------------------------------------------
     * 1. FONT IMPORT
     * ------------------------------------------------------------------- */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap');

    /* -------------------------------------------------------------------
     * 2. CSS CUSTOM PROPERTIES
     * ------------------------------------------------------------------- */
    :root {
      --neon-cyan:        #00e5ff;
      --neon-teal:        #00bfa5;
      --glow-sm:          0 0 8px rgba(0, 229, 255, 0.3);
      --glow-md:          0 0 20px rgba(0, 229, 255, 0.25), 0 0 40px rgba(0, 229, 255, 0.1);
      --card-border-hover: rgba(0, 229, 255, 0.4);
    }

    /* -------------------------------------------------------------------
     * 3. GLOBAL FONT
     * ------------------------------------------------------------------- */
    body,
    .service-name,
    .service-description,
    .service-group-name,
    .bookmark > a {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    /* -------------------------------------------------------------------
     * 4. BACKGROUND DEEPENING
     * ------------------------------------------------------------------- */
    body {
      background-color: #070b10;
    }

    /* -------------------------------------------------------------------
     * 5. SERVICE CARD HOVER GLOW
     * ------------------------------------------------------------------- */
    .service-card {
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      border: 1px solid transparent;
    }

    .service-card:hover {
      transform:    translateY(-4px);
      box-shadow:   var(--glow-md);
      border-color: var(--card-border-hover);
    }

    /* -------------------------------------------------------------------
     * 6. CARD STAGGER REVEAL ANIMATION
     * ------------------------------------------------------------------- */
    @keyframes card-reveal {
      from {
        opacity:   0;
        transform: translateY(16px);
      }
      to {
        opacity:   1;
        transform: translateY(0);
      }
    }

    .service-card {
      opacity: 0;
      animation: card-reveal 0.45s ease both;
      animation-fill-mode: forwards;
    }

    /* -------------------------------------------------------------------
     * 7. SECTION GROUP HEADERS
     * ------------------------------------------------------------------- */
    .service-group-name {
      color:          var(--neon-teal);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size:      0.7rem;
      border-left:    3px solid var(--neon-teal);
      padding-left:   0.6em;
    }

    /* -------------------------------------------------------------------
     * 8. BOOKMARK HOVER GLOW
     * ------------------------------------------------------------------- */
    .bookmark > a {
      transition:    border-color 0.2s ease, box-shadow 0.2s ease;
      border:        1px solid transparent;
      border-radius: 6px;
      padding:       2px 6px;
    }

    .bookmark > a:hover {
      border-color: var(--card-border-hover);
      box-shadow:   var(--glow-sm);
    }

    /* -------------------------------------------------------------------
     * 9. SEARCH BAR NEON FOCUS
     * ------------------------------------------------------------------- */
    .information-widget-search input:focus {
      border-bottom: 2px solid var(--neon-cyan) !important;
      box-shadow: 0 4px 12px rgba(0, 229, 255, 0.2) !important;
      outline: none;
    }

    /* -------------------------------------------------------------------
     * 10. DATETIME WIDGET LARGE GLOW
     * ------------------------------------------------------------------- */
    .information-widget-datetime span {
      font-size:     clamp(1rem, 2.5vw, 1.5rem) !important;
      letter-spacing: 0.06em;
      color:         var(--neon-cyan);
      text-shadow:   var(--glow-sm);
    }

    /* -------------------------------------------------------------------
     * 11. STATUS PULSE ANIMATION
     * ------------------------------------------------------------------- */
    @keyframes pulse-glow {
      0%, 100% {
        opacity: 0.8;
        filter:  drop-shadow(0 0 3px rgba(0, 229, 255, 0.3));
      }
      50% {
        opacity: 1;
        filter:  drop-shadow(0 0 8px rgba(0, 229, 255, 0.7));
      }
    }

    .service-tag svg {
      animation: pulse-glow 2.8s ease-in-out infinite;
    }

    /* -------------------------------------------------------------------
     * 12. HEADER WIDGET SEPARATOR
     * ------------------------------------------------------------------- */
    #information-widgets {
      border-bottom: 1px solid rgba(0, 229, 255, 0.15);
      padding-bottom: 0.5rem;
    }

    /* -------------------------------------------------------------------
     * 13. CUSTOM SCROLLBAR
     * ------------------------------------------------------------------- */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--neon-teal) #0d1117;
    }

    *::-webkit-scrollbar {
      width: 4px;
    }

    *::-webkit-scrollbar-track {
      background: #0d1117;
    }

    *::-webkit-scrollbar-thumb {
      background-color: var(--neon-teal);
      border-radius:    4px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background-color: var(--neon-cyan);
    }

    /* -------------------------------------------------------------------
     * 14. COMPACT LAYOUT — denser grid, reduced padding
     * ------------------------------------------------------------------- */

    /* Tighten gap between service groups */
    #services {
      gap: 0.75rem !important;
    }

    /* Reduce padding inside each service card */
    .service-card {
      padding: 0.5rem 0.75rem !important;
    }

    /* Shrink service icon */
    .service-icon {
      width:  2rem !important;
      height: 2rem !important;
    }

    /* Smaller service name */
    .service-name {
      font-size: 0.8rem !important;
    }

    /* Smaller description text */
    .service-description {
      font-size: 0.7rem !important;
    }

    /* Tighten group header bottom margin */
    .service-group-name {
      margin-bottom: 0.35rem !important;
    }

    /* Reduce card gap within each group row */
    .service-group > ul {
      gap: 0.5rem !important;
    }
