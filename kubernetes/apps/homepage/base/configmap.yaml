apiVersion: v1
kind: ConfigMap
metadata:
    name: homepage-config
data:
    settings.yaml: |
        title: Homelab
        theme: dark
        color: slate
        headerStyle: clean
        cardBlur: md
        target: _blank
        hideVersion: true

    bookmarks.yaml: |
        - Bookmarks:
            - GitHub:
              - abbr: GH
                href: https://github.com/leehosanganson
            
            - Side Project:
              - abbr: SP
                href: https://github.com/users/leehosanganson/projects/15/views/1

            - Homelab:
              - abbr: HL
                href: https://github.com/users/leehosanganson/projects/14

            - Youtube:
              - abbr: YT
                href: https://www.youtube.com/

            - Azure:
              - abbr: AZ
                href: https://portal.azure.com/#home

    widgets.yaml: |
        - search:
            provider: google
            target: _blank

        - datetime:
            text_size: xl
            format:
              dateStyle: short
              timeStyle: short
              hour12: true

        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "cluster"
            nodes:
              show: true
              cpu: true
              memory: true

    services.yaml: |
        - Home:
            - Home Assistant:
                icon: home-assistant.png
                href: https://home-assistant.homelab.leehosanganson.dev
                description: Home automation
            - Actual Budget:
                icon: actual-budget.png
                href: https://actual-budget.homelab.leehosanganson.dev
                description: Personal finance manager
            - Paperless-ngx:
                icon: paperless.png
                href: https://paperless.homelab.leehosanganson.dev
                description: Document management

        - Work:
            - Commafeed:
                icon: commafeed.png
                href: https://commafeed.leehosanganson.dev
                description: RSS feed reader
            - Karakeep:
                icon: karakeep.png
                href: https://karakeep.leehosanganson.dev
                description: Bookmark manager
            - Zotero WebDAV:
                icon: zotero.png
                href: https://zotero.leehosanganson.dev
                description: Zotero file storage
            - Coder:
                icon: coder.png
                href: https://coder.homelab.leehosanganson.dev
                description: Cloud development environments
            - Open WebUI:
                icon: open-webui.png
                href: https://openwebui.homelab.leehosanganson.dev
                description: AI chat interface
            - N8N:
                icon: n8n.png
                href: https://n8n.homelab.leehosanganson.dev
                description: Workflow automation
            - IT Tools:
                icon: it-tools.png
                href: https://it-tools.leehosanganson.dev
                description: Developer tools
            - Termix:
                icon: terminal.png
                href: https://termix.homelab.leehosanganson.dev
                description: Web terminal
            - Harbor:
                icon: harbor.png
                href: https://harbor.leehosanganson.dev/harbor/projects
                description: Container registry

        - Entertainment:
            - Jellyfin:
                icon: jellyfin.png
                href: https://jellyfin.homelab.leehosanganson.dev
                description: Media server
                widget:
                    type: jellyfin
                    url: https://jellyfin.homelab.leehosanganson.dev
                    key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}
                    version: 2
                    enableBlocks: true
                    enableNowPlaying: true
            - Jellyseerr:
                icon: jellyseerr.png
                href: https://jellyseerr.homelab.leehosanganson.dev
                description: Media request management
                widget:
                    type: seerr
                    url: https://jellyseerr.homelab.leehosanganson.dev
                    key: {{HOMEPAGE_VAR_JELLYSEERR_API_KEY}}
            - Navidrome:
                icon: navidrome.png
                href: https://navidrome.leehosanganson.dev
                description: Music streaming
            - Granblue Fantasy  Remote Instance:
                icon: chrome.png
                href: https://novnc-chrome.homelab.leehosanganson.dev
                description: Browser in browser

        - Monitoring:
            - Cluster:
                icon: grafana.png
                href: https://grafana.homelab.leehosanganson.dev/d/efa86fd1d0c121a26444b636a3f509a8/kubernetes-compute-resources-cluster?orgId=1&from=now-1h&to=now&timezone=utc&var-datasource=default&var-cluster=&refresh=10s
                description: Cluster Dashboard
            
            - Logs:
                icon: grafana.png
                href: https://grafana.homelab.leehosanganson.dev/a/grafana-lokiexplore-app/explore?patterns=[]&from=now-15m&to=now&timezone=browser&var-lineFormat=&var-ds=ceqjy8egm34lcf&var-filters=&var-fields=&var-levels=&var-metadata=&var-jsonFields=&var-all-fields=&var-patterns=&var-lineFilterV2=&var-lineFilters=&var-primary_label=service_name|%3D~|.%2B&refresh=auto
                description: Loki Logs

        - Infrastructure:
            - UniFi:
                icon: ubiquiti.png
                href: http://unifi.ui.com
                description: UniFi Network controller
                widget:
                    type: unifi
                    url: https://192.168.1.1
                    key: {{HOMEPAGE_VAR_UNIFI_API_KEY}}
            - pve01:
                icon: proxmox.png
                href: https://pve01.home.lab:8006
                description: Proxmox VE node 1
                widget:
                    type: proxmox
                    url: https://pve01.home.lab:8006
                    username: api@pam!homepage
                    password: {{HOMEPAGE_VAR_PROXMOX_API_TOKEN_SECRET}}
                    node: pve01
            - pve02:
                icon: proxmox.png
                href: https://pve02.home.lab:8006
                description: Proxmox VE node 2
                widget:
                    type: proxmox
                    url: https://pve02.home.lab:8006
                    username: api@pam!homepage
                    password: {{HOMEPAGE_VAR_PROXMOX_API_TOKEN_SECRET}}
                    node: pve02
            - pve03:
                icon: proxmox.png
                href: https://pve03.home.lab:8006
                description: Proxmox VE node 3
                widget:
                    type: proxmox
                    url: https://pve03.home.lab:8006
                    username: api@pam!homepage
                    password: {{HOMEPAGE_VAR_PROXMOX_API_TOKEN_SECRET}}
                    node: pve03
            - pihole-1:
                icon: pi-hole.png
                href: https://pihole-1.infra.leehosanganson.dev/admin/login
                description: Pi-hole DNS (primary)
                widget:
                    type: pihole
                    url: https://pihole-1.infra.leehosanganson.dev
                    version: 6
                    key: {{HOMEPAGE_VAR_PIHOLE_1_API_KEY}}
            - pihole-2:
                icon: pi-hole.png
                href: https://pihole-2.infra.leehosanganson.dev/admin/login
                description: Pi-hole DNS (secondary)
                widget:
                    type: pihole
                    url: https://pihole-2.infra.leehosanganson.dev
                    version: 6
                    key: {{HOMEPAGE_VAR_PIHOLE_2_API_KEY}}
            - DS923:
                icon: synology-dsm.png
                href: https://nas-1.infra.leehosanganson.dev/#/signin
                description: Synology NAS
                widget:
                    type: diskstation
                    url: https://nas-1.infra.leehosanganson.dev
                    username: {{HOMEPAGE_VAR_SYNOLOGY_USERNAME}}
                    password: {{HOMEPAGE_VAR_SYNOLOGY_PASSWORD}}
                    volume: volume_1
            - Cloudflare:
                icon: cloudflare.png
                href: https://dash.cloudflare.com
                description: Cloudflare DNS/CDN

        - Media Management:
            - Sonarr:
                icon: sonarr.png
                href: https://sonarr.homelab.leehosanganson.dev
                description: TV series management
                widget:
                    type: sonarr
                    url: https://sonarr.homelab.leehosanganson.dev
                    key: {{HOMEPAGE_VAR_SONARR_API_KEY}}
                    enableQueue: true
            - Radarr:
                icon: radarr.png
                href: https://radarr.homelab.leehosanganson.dev
                description: Movie management
                widget:
                    type: radarr
                    url: https://radarr.homelab.leehosanganson.dev
                    key: {{HOMEPAGE_VAR_RADARR_API_KEY}}
                    enableQueue: true
            - Lidarr:
                icon: lidarr.png
                href: https://lidarr.homelab.leehosanganson.dev
                description: Music management
                widget:
                    type: lidarr
                    url: https://lidarr.homelab.leehosanganson.dev
                    key: {{HOMEPAGE_VAR_LIDARR_API_KEY}}
            - Bazarr:
                icon: bazarr.png
                href: https://bazarr.homelab.leehosanganson.dev
                description: Subtitle management
                widget:
                    type: bazarr
                    url: https://bazarr.homelab.leehosanganson.dev
                    key: {{HOMEPAGE_VAR_BAZARR_API_KEY}}
            - Prowlarr:
                icon: prowlarr.png
                href: https://prowlarr.homelab.leehosanganson.dev
                description: Indexer management
                widget:
                    type: prowlarr
                    url: https://prowlarr.homelab.leehosanganson.dev
                    key: {{HOMEPAGE_VAR_PROWLARR_API_KEY}}
            - qBittorrent:
                icon: qbittorrent.png
                href: https://qbittorrent.homelab.leehosanganson.dev
                description: Torrent client
                widget:
                    type: qbittorrent
                    url: https://qbittorrent.homelab.leehosanganson.dev
                    username: {{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}
                    password: {{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}
            - LRCGet:
                icon: lrcget.png
                href: https://lrcget.homelab.leehosanganson.dev
                description: Lyrics downloader
            - Slskd:
                icon: slskd.png
                href: https://slskd.homelab.leehosanganson.dev
                description: Soulseek client

    kubernetes.yaml: |
        mode: default

    proxmox.yaml: |
        pve01:
            url: https://pve01.home.lab:8006
            token: api@pam!homepage
            secret: {{HOMEPAGE_VAR_PROXMOX_API_TOKEN_SECRET}}

    docker.yaml: ""
    custom.js: ""
    custom.css: ""
