apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: 18.4.3
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: loki-values
