fullnameOverride: tempo

gateway:
  enabled: true

minio:
  enabled: true

storage:
  trace:
    backend: s3
    s3:
      access_key: grafana-tempo
      secret_key: supersecret
      bucket: tempo-traces
      endpoint: tempo-minio:9000
      insecure: true

traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
