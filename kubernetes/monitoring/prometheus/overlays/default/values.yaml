server:
  retention: 14d
  retentionSize: 100GB
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
  persistentVolume:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 150Gi

extraScrapeConfigs: |
  - job_name: litellm
    metrics_path: /metrics/
    static_configs:
      - targets:
          - litellm.llm.svc.cluster.local:4000
