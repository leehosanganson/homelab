persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 1Gi

admin:
  existingSecret: grafana-secrets
  userKey: admin-user
  passwordKey: admin-password

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 30s

      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.monitoring.svc.cluster.local
        access: proxy
        jsonData:
          maxLines: 2048

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: grafana-com
        orgId: 1
        folder: "Homelab"
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards/grafana-com

downloadDashboardsImage:
  repository: curlimages/curl
  tag: 8.7.1
  pullPolicy: IfNotPresent

downloadDashboards:
  env: {}
