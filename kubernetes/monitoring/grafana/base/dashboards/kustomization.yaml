resources:
  - https://github.com/dotdc/grafana-dashboards-kubernetes//?ref=master

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: litellm-dashboard
    files:
      - litellm-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"

labels:
  - pairs:
      grafana_dashboard: "1"

commonAnnotations:
  grafana_folder: "Kubernetes"
