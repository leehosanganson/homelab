name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
jobs:
  opencode:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        (github.event_name == 'issue_comment' && contains(fromJson('["OWNER","MEMBER"]'), github.event.issue.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(fromJson('["OWNER","MEMBER"]'), github.event.pull_request.author_association))
      ) &&
      (contains(github.event.comment.body, '/opencode') || contains(github.event.comment.body, '/oc'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          LITELLM_KEY: ${{ secrets.LITELLM_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_CONFIG: .github/opencode.json
          OPENCODE_PERMISSION: |
            {
              "*": "allow",
              "bash": {
                "*": "deny",
                "gh pr *": "allow",
                "gh search *": "allow"
              }
            }
        with:
          model: "litellm/unsloth/qwen-3.6"
