name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
jobs:
  opencode:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        contains(fromJson('["OWNER","MEMBER"]'), github.event.comment.author_association) &&
        (contains(github.event.comment.body, '/opencode') || contains(github.event.comment.body, '/oc'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a # latest
        env:
          LITELLM_KEY: ${{ secrets.LITELLM_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_CONFIG: .github/opencode.json
          OPENCODE_PERMISSION: |
            {
              "*": "allow",
              "bash": {
                "*": "deny",
                "gh pr *": "allow",
                "gh search *": "allow"
              }
            }
        with:
          model: "litellm/unsloth/qwen-3.6"
