name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Generate OpenCode Config
        run: |
          cat << 'EOF' > opencode.json
          {
            "permission": { "skill": { "*": "allow" } },
            "compaction": { "auto": true, "prune": true, "reserved": 8192 },
            "provider": {
              "litellm": {
                "npm": "@ai-sdk/openai-compatible",
                "options": {
                  "baseURL": "https://litellm.leehosanganson.dev/v1",
                  "apiKey": {env:LITELLM_KEY}

                },
                "models": {
                  "unsloth/qwen-3.6": {
                    "limit": { "context": 131072, "output": 8192 }
                  }
                }
              }
            }
          }
          EOF

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          LITELLM_KEY: ${{ secrets.LITELLM_KEY }}
        with:
          model: "litellm/unsloth/qwen-3.6"
