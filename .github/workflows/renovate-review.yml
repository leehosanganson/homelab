name: renovate-review

on:
  pull_request_target:
    types: [opened, synchronize]
    branches: []

jobs:
  review-renovate-pr:
    if: ${{ startsWith(github.head_ref, 'renovate/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Get PR details
        id: pr-details
        run: |
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          gh api /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} > pr_data.json
          echo "title=$(jq -r .title pr_data.json)" >> $GITHUB_OUTPUT
          echo "sha=$(jq -r .head.sha pr_data.json)" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run OpenCode Review Agent
        env:
          LITELLM_KEY: ${{ secrets.LITELLM_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_CONFIG: .github/opencode/opencode.json
        run: |
          PR_BODY=$(jq -r .body pr_data.json)
          opencode run -m litellm/unsloth/qwen-3.6 "A Renovate dependency update pull request has been created: '${{ steps.pr-details.outputs.title }}'

          <pr-number>
          ${{ github.event.pull_request.number }}
          </pr-number>

          <commit-sha>
          ${{ steps.pr-details.outputs.sha }}
          </commit-sha>

          <pr-description>
          $PR_BODY
          </pr-description>

          Please review this Renovate PR against the following checklist:

          ## 1. Release Age Gate Verification
          - Confirm the new version/release is at least 14 days old. If newer, flag and recommend waiting.

          ## 2. Breaking Changes Analysis
          - Compare current image/tag version with the new one. For Docker images: check Docker Hub changelogs, GitHub release notes, or official docs for breaking API changes between versions. Cross-reference Kubernetes deployment files in \`kubernetes/apps/<app>/base/deployment.yaml\` — check if environment variables, ports, commands, or health checks need updating. Flag any container image that mentions 'breaking' or major version bumps (e.g., MariaDB 11.x → 12.x).

          ## 3. Security Risk Assessment
          - Search for CVEs/vulnerabilities using \`gh search\` on GitHub advisories and Docker Hub security notices. Check if the new version fixes known vulnerabilities in the old version. Flag images from unverified publishers or registries with weak access controls. Only flag HIGH or CRITICAL severity CVEs, not medium/low ones.

          ## 4. Version Compatibility
          - Verify the new version is compatible with other services in the same app stack (e.g., if Paperless-ngx image updates, also check its Redis DB deployment). Check if database versions are synchronized (e.g., MariaDB upgrade should not be paired with an application that hasn't been tested against it). Flag mismatched or out-of-order upgrades (app updated before its dependencies).

          ## 5. Deployment Impact Analysis
          - **Database migrations:** If a DB image is updating (e.g., \`lscr.io/linuxserver/mariadb:11.4.8 → 11.5.x\`), note that CloudNative-PG managed clusters handle minor version upgrades automatically, but major version jumps require migration plans. Check the app's deployment for any DB connection config changes needed.
          - **Persistent volumes:** Flag if new container versions change default mount paths or data directory layouts.
          - **Configuration format changes:** If the app uses ConfigMaps (per AGENTS.md conventions), note if config file formats changed between versions.

          ## 6. NixOS-Specific Checks
          - When PR modifies \`flake.lock\` or NixOS host configs: compare old vs new git hash in flake.lock. Assess if any service versions being upgraded have known breaking changes (check nixpkgs commit messages). Flag upgrades that touch \`system.stateVersion\` or require \`nixos-rebuild\` migration steps. For multi-host setups (haproxy-1/2/3, opencode-1): note which hosts are affected and whether service restart patterns need coordination.

          Post a summary review comment on this PR thread using \`gh pr comment\`, replacing placeholders with actual values:
          
          ```bash
          gh pr comment <PR_NUMBER> --body '<MULTILINE_COMMENT>'
          ```

          The summary should include:
          - **Status:** PASS / NEEDS_REVISION
          - **Findings:** Bullet points for each category checked (1-6)
          - **Recommendation:** Clear go/no-go suggestion

          When you find specific issues in files, leave inline file comments using \`gh api\`, replacing placeholders:
          
          ```bash
          gh api \\
            --method POST \\
            -H "Accept: application/vnd.github+json" \\
            -H "X-GitHub-Api-Version: 2022-11-28" \\
            /repos/<OWNER>/<REPO>/pulls/<PR_NUMBER>/comments \\
            -f 'body=[summary of issue]' -f 'commit_id=<COMMIT_SHA>' -f 'path=[path-to-file]' -F 'line=[line]' -f 'side=RIGHT'
          ```

          Replace <OWNER>/<REPO> with ${{ github.repository }}, <PR_NUMBER> with ${{ github.event.pull_request.number }}, and <COMMIT_SHA> with the HEAD commit SHA."
