name: opencode-build
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc @build') ||
      startsWith(github.event.comment.body, '/oc @build') ||
      contains(github.event.comment.body, ' /opencode @build') ||
      startsWith(github.event.comment.body, '/opencode @build')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          LITELLM_KEY: ${{ secrets.LITELLM_KEY }}
        with:
          model: "litellm/unsloth/qwen-3.6"
          agent: build
