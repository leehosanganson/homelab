name: opencode-review
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
jobs:
  opencode:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') && (
        contains(github.event.comment.body, ' /oc review') ||
        startsWith(github.event.comment.body, '/oc review') ||
        contains(github.event.comment.body, ' /opencode review') ||
        startsWith(github.event.comment.body, '/opencode review')
      ) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          LITELLM_KEY: ${{ secrets.LITELLM_KEY }}
        with:
          model: "litellm/unsloth/qwen-3.6"
          agent: review
